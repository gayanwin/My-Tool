<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayan's Smart Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #2563eb; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-blue-600 pt-8 pb-12 px-6 rounded-b-[40px] shadow-lg text-white">
        <h1 class="text-xl font-bold">Gayan Chinthaka</h1>
        <p class="text-blue-100 text-xs">NWSDB O&M • Smart Dashboard</p>
    </div>

    <div class="px-5 -mt-6">
        
        <div id="home" class="tab-content active space-y-5">
            <div class="app-card p-5">
                <h2 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-pen-to-square mr-2 text-blue-500"></i>Quick Office Note</h2>
                <textarea id="notes" class="w-full h-32 p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-400 text-sm" placeholder="Write anything..."></textarea>
                <button onclick="saveNote()" class="w-full mt-3 bg-blue-600 text-white py-3 rounded-xl font-bold active:scale-95 transition">Save to Device</button>
            </div>
            <div class="app-card p-5">
                <h2 class="font-bold text-gray-800 mb-3 text-green-600"><i class="fa-solid fa-list-check mr-2"></i>Daily Jobs</h2>
                <div class="space-y-3">
                    <label class="flex items-center p-3 bg-gray-50 rounded-xl"><input type="checkbox" class="w-5 h-5 rounded text-blue-600"> <span class="ml-3 text-sm">Check Cheque Registry</span></label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-xl"><input type="checkbox" class="w-5 h-5 rounded text-blue-600"> <span class="ml-3 text-sm">Clothing Stock Update</span></label>
                </div>
            </div>
        </div>

        <div id="calc" class="tab-content space-y-5">
            <div class="app-card p-5">
                <h2 class="font-bold text-gray-800 mb-4 text-orange-600"><i class="fa-solid fa-shirt mr-2"></i>Clothing Profit Calc</h2>
                <div class="space-y-3">
                    <input type="number" id="cost" placeholder="Cost Price (ගන්න මිල)" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-gray-100">
                    <input type="number" id="sell" placeholder="Selling Price (විකුණන මිල)" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-gray-100">
                    <button onclick="calcProfit()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">Calculate Profit</button>
                    <div id="profit-result" class="text-center font-bold text-lg text-gray-700 mt-2"></div>
                </div>
            </div>
        </div>

        <div id="fuel" class="tab-content space-y-5">
            <div class="app-card p-5">
                <h2 class="font-bold text-gray-800 mb-4 text-red-600"><i class="fa-solid fa-gas-pump mr-2"></i>Fuel Price Adjuster</h2>
                <div class="space-y-3">
                    <input type="number" id="old-price" placeholder="Old Price" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-gray-100">
                    <input type="number" id="new-price" placeholder="New Price" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-gray-100">
                    <button onclick="calcFuel()" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold">Find Difference</button>
                    <div id="fuel-result" class="text-center font-bold text-lg text-red-600 mt-2"></div>
                </div>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-4 left-4 right-4 bg-white h-16 rounded-2xl shadow-2xl flex items-center justify-around px-2 border border-gray-100">
        <button onclick="showTab('home')" class="nav-btn flex flex-col items-center nav-active" id="home-btn">
            <i class="fa-solid fa-house"></i><span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="showTab('calc')" class="nav-btn flex flex-col items-center text-gray-400" id="calc-btn">
            <i class="fa-solid fa-shirt"></i><span class="text-[10px] font-bold">Business</span>
        </button>
        <button onclick="showTab('fuel')" class="nav-btn flex flex-col items-center text-gray-400" id="fuel-btn">
            <i class="fa-solid fa-gas-pump"></i><span class="text-[10px] font-bold">Fuel</span>
        </button>
    </nav>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-blue-600', 'text-gray-400'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById(tabId + '-btn').classList.replace('text-gray-400', 'text-blue-600');
        }

        function saveNote() {
            localStorage.setItem('gayan_note', document.getElementById('notes').value);
            alert('Note Saved! ✅');
        }

        function calcProfit() {
            let cost = document.getElementById('cost').value;
            let sell = document.getElementById('sell').value;
            if(cost && sell) {
                let profit = sell - cost;
                document.getElementById('profit-result').innerText = "Profit: Rs. " + profit;
            }
        }

        function calcFuel() {
            let oldP = document.getElementById('old-price').value;
            let newP = document.getElementById('new-price').value;
            if(oldP && newP) {
                let diff = newP - oldP;
                document.getElementById('fuel-result').innerText = "Difference: Rs. " + diff;
            }
        }

        window.onload = () => {
            document.getElementById('notes').value = localStorage.getItem('gayan_note') || '';
        }
    </script>
</body>
</html>
