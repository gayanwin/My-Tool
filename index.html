<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayan Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .app-card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .nav-item:active { transform: scale(0.9); transition: 0.2s; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-blue-600 pt-8 pb-12 px-6 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-white text-xl font-bold">Gayan Chinthaka</h1>
                <p class="text-blue-100 text-xs">NWSDB O&M Kurunegala</p>
            </div>
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-md">
                <i class="fa-solid fa-user text-blue-600"></i>
            </div>
        </div>
    </div>

    <div class="px-5 -mt-6 space-y-5">
        
        <div class="app-card p-5">
            <div class="flex items-center mb-3">
                <i class="fa-solid fa-pen-to-square text-blue-500 mr-2"></i>
                <h2 class="font-bold text-gray-800">Quick Note</h2>
            </div>
            <textarea id="notes" class="w-full h-24 p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-400 text-sm" placeholder="Write something..."></textarea>
            <button onclick="saveNote()" class="w-full mt-3 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md active:bg-blue-700">Save to Device</button>
        </div>

        <div class="app-card p-5">
            <div class="flex items-center mb-4 text-green-600">
                <i class="fa-solid fa-list-check mr-2"></i>
                <h2 class="font-bold">Daily Jobs</h2>
            </div>
            <div class="space-y-4">
                <label class="flex items-center p-3 bg-gray-50 rounded-xl">
                    <input type="checkbox" class="w-5 h-5 rounded-md text-blue-600 border-gray-300">
                    <span class="ml-3 text-sm text-gray-700">Cheque Registry Update</span>
                </label>
                <label class="flex items-center p-3 bg-gray-50 rounded-xl">
                    <input type="checkbox" class="w-5 h-5 rounded-md text-blue-600 border-gray-300">
                    <span class="ml-3 text-sm text-gray-700">Stock Count (Clothing)</span>
                </label>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-4 left-4 right-4 bg-white h-16 rounded-2xl shadow-2xl flex items-center justify-around px-4 border border-gray-100">
        <button class="nav-item flex flex-col items-center text-blue-600">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] mt-1 font-bold">Home</span>
        </button>
        <button class="nav-item flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-calculator text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Calculator</span>
        </button>
        <button class="nav-item flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-robot text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">AI Bot</span>
        </button>
        <button class="nav-item flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-gear text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Settings</span>
        </button>
    </nav>

    <script>
        function saveNote() {
            localStorage.setItem('gayan_note', document.getElementById('notes').value);
            alert('Saved successfully! ✅');
        }
        window.onload = () => {
            document.getElementById('notes').value = localStorage.getItem('gayan_note') || '';
        }
    </script>
</body>
</html>
