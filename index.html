<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayan Hub v3.7.0 - Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .crystal-card { background: white; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Game Styles */
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card { height: 70px; background: #e2e8f0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; transform-style: preserve-3d; }
        .card.flipped { background: #3b82f6; color: white; transform: rotateY(180deg); }
        .card.matched { background: #22c55e; color: white; visibility: visible; }
        .nav-active { color: #2563eb; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white/80 backdrop-blur-md p-5 flex justify-between items-center px-6 border-b border-slate-100 sticky top-0 z-50">
        <div>
            <h1 class="text-[14px] font-bold text-slate-800 tracking-tight">Gayan Hub</h1>
            <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest">Together Out: Level 01</p>
        </div>
        <div class="text-right">
            <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-[10px] font-bold">v3.7.0</span>
        </div>
    </header>

    <main class="px-5 pt-6">

        <div id="game" class="tab-content active">
            <div class="crystal-card p-6 text-center">
                <div class="flex justify-between items-center mb-6">
                    <div class="text-left">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Moves</p>
                        <p id="moves" class="text-xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Time</p>
                        <p id="timer" class="text-xl font-bold text-slate-800">00:00</p>
                    </div>
                </div>

                <div class="game-grid" id="grid">
                    </div>

                <button onclick="resetGame()" class="mt-8 w-full bg-slate-800 text-white py-4 rounded-2xl text-[11px] font-bold shadow-lg active:scale-95 transition">
                    <i class="fa-solid fa-rotate-right mr-2"></i>Restart Level
                </button>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <div class="crystal-card p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Game Settings</p>
                <div class="space-y-4">
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl">
                        <span class="text-[11px] font-semibold text-slate-600">Sound Effects</span>
                        <div class="w-10 h-5 bg-blue-500 rounded-full"></div>
                    </div>
                    <p class="text-[9px] text-slate-400">Level 01: Memory Match. Find all pairs to unlock Level 02.</p>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 h-20 flex items-center justify-around px-8">
        <button onclick="switchTab('game', this)" class="nav-btn nav-active flex flex-col items-center">
            <i class="fa-solid fa-gamepad text-xl"></i>
            <span class="text-[9px] mt-1 font-bold uppercase">Play</span>
        </button>
        <button onclick="switchTab('settings', this)" class="nav-btn text-slate-300 flex flex-col items-center">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[9px] mt-1 font-bold uppercase">Stats</span>
        </button>
    </nav>

    <script>
        const icons = ['🚀', '🚀', '💎', '💎', '⚡', '⚡', '🔥', '🔥', '🌟', '🌟', '🍀', '🍀', '🍎', '🍎', '🌈', '🌈'];
        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let timerSeconds = 0;
        let timerInterval;

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-slate-300'); });
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('nav-active');
            btn.classList.remove('text-slate-300');
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const shuffled = icons.sort(() => Math.random() - 0.5);
            
            shuffled.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.innerHTML = '';
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped');
                card.innerHTML = card.dataset.icon;
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    moves++;
                    document.getElementById('moves').innerText = moves;
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.icon === card2.dataset.icon) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                if (matchedCount === icons.length) {
                    clearInterval(timerInterval);
                    alert(`පට්ට මචං! Level 01 ඉවරයි. \nවේලාව: ${document.getElementById('timer').innerText} \nMoves: ${moves}`);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerHTML = '';
                    card2.innerHTML = '';
                    flippedCards = [];
                }, 700);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timerSeconds++;
                let mins = Math.floor(timerSeconds / 60);
                let secs = timerSeconds % 60;
                document.getElementById('timer').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function resetGame() {
            moves = 0;
            matchedCount = 0;
            timerSeconds = 0;
            document.getElementById('moves').innerText = '0';
            document.getElementById('timer').innerText = '00:00';
            clearInterval(timerInterval);
            createGrid();
            startTimer();
        }

        window.onload = resetGame;
    </script>
</body>
</html>
