<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Together Out v3.8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #fdfdfd; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid #f1f5f9; border-radius: 30px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.03); }
        .game-node { aspect-ratio: 1; border-radius: 20px; background: #f1f5f9; transition: 0.3s; cursor: pointer; border: 2px solid transparent; }
        .game-node.active { transform: scale(0.95); background: #3b82f6; border-color: #93c5fd; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .game-node.wrong { background: #ef4444; }
        .status-bar { border-radius: 100px; background: #f8fafc; padding: 10px 20px; border: 1px solid #f1f5f9; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .waiting { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-2xl font-800 text-slate-800">Level 02</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sequence Master</p>
        </div>
        <div class="text-right">
            <span class="bg-indigo-600 text-white px-3 py-1 rounded-full text-[10px] font-bold">Gayan's Lab</span>
        </div>
    </div>

    <div class="glass-panel p-8">
        <div class="flex justify-between items-center mb-10">
            <div class="status-bar flex items-center gap-3">
                <i class="fa-solid fa-bolt text-amber-500"></i>
                <span id="score" class="text-sm font-bold text-slate-700">Score: 0</span>
            </div>
            <div id="status-text" class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter waiting">Watch the pattern...</div>
        </div>

        <div class="grid grid-cols-3 gap-4" id="game-grid">
            <div class="game-node" onclick="playerClick(0)" id="node-0"></div>
            <div class="game-node" onclick="playerClick(1)" id="node-1"></div>
            <div class="game-node" onclick="playerClick(2)" id="node-2"></div>
            <div class="game-node" onclick="playerClick(3)" id="node-3"></div>
            <div class="game-node" onclick="playerClick(4)" id="node-4"></div>
            <div class="game-node" onclick="playerClick(5)" id="node-5"></div>
            <div class="game-node" onclick="playerClick(6)" id="node-6"></div>
            <div class="game-node" onclick="playerClick(7)" id="node-7"></div>
            <div class="game-node" onclick="playerClick(8)" id="node-8"></div>
        </div>

        <div class="mt-10 text-center">
            <button onclick="startGame()" id="start-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl text-[12px] font-bold shadow-xl active:scale-95 transition">
                Start Challenge
            </button>
        </div>
    </div>

    <script>
        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let isWaiting = false;

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 0;
            document.getElementById('score').innerText = "Score: 0";
            document.getElementById('start-btn').classList.add('hidden');
            nextRound();
        }

        function nextRound() {
            playerSequence = [];
            level++;
            document.getElementById('score').innerText = `Score: ${level - 1}`;
            sequence.push(Math.floor(Math.random() * 9));
            showSequence();
        }

        async function showSequence() {
            isWaiting = true;
            document.getElementById('status-text').innerText = "WATCHING...";
            document.getElementById('status-text').classList.add('text-blue-500');
            
            for (let id of sequence) {
                await flashNode(id);
                await new Promise(r => setTimeout(r, 400));
            }
            
            isWaiting = false;
            document.getElementById('status-text').innerText = "YOUR TURN!";
            document.getElementById('status-text').classList.replace('text-blue-500', 'text-green-500');
        }

        function flashNode(id) {
            return new Promise(resolve => {
                const node = document.getElementById(`node-${id}`);
                node.classList.add('active');
                setTimeout(() => {
                    node.classList.remove('active');
                    resolve();
                }, 400);
            });
        }

        function playerClick(id) {
            if (isWaiting) return;

            playerSequence.push(id);
            const node = document.getElementById(`node-${id}`);
            node.classList.add('active');
            setTimeout(() => node.classList.remove('active'), 200);

            if (playerSequence[playerSequence.length - 1] !== sequence[playerSequence.length - 1]) {
                gameOver();
                return;
            }

            if (playerSequence.length === sequence.length) {
                setTimeout(nextRound, 800);
            }
        }

        function gameOver() {
            document.getElementById('status-text').innerText = "GAME OVER!";
            document.getElementById('status-text').classList.add('text-red-500');
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "Try Again";
            
            // Shake effect
            const grid = document.getElementById('game-grid');
            grid.style.transform = 'translateX(10px)';
            setTimeout(() => grid.style.transform = 'translateX(-10px)', 100);
            setTimeout(() => grid.style.transform = 'translateX(0)', 200);
            
            alert(`අයියෝ මචං! වැරදුණා. \nScore: ${level - 1}`);
        }
    </script>
</body>
</html>
