<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayan Hub v3.4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Poppins', sans-serif; font-size: 11px; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .crystal-card { background: white; border-radius: 16px; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #2563eb; font-weight: 600; }
        .nav-active i { transform: scale(1.1); }
        input, textarea { font-size: 11px !important; outline: none; border: 1px solid #f1f5f9 !important; transition: 0.2s; }
        input:focus, textarea:focus { border-color: #3b82f6 !important; background: white; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 sticky top-0 z-50 flex justify-between items-center px-6">
        <div>
            <h1 class="text-[13px] font-semibold text-slate-800 tracking-tight">Gayan Chinthaka</h1>
            <p class="text-[9px] text-slate-400 font-medium uppercase tracking-widest">NWSDB O&M Hub</p>
        </div>
        <div class="flex flex-col items-end">
            <span class="bg-blue-600 text-white px-2.5 py-0.5 rounded-full text-[9px] font-bold shadow-sm">v3.4.0</span>
            <span class="text-[8px] text-green-500 mt-1 font-bold uppercase tracking-widest italic">Sync Master</span>
        </div>
    </header>

    <main class="px-5 pt-6">
        
        <div id="home" class="tab-content active space-y-4">
            <div class="crystal-card p-5">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Office Memo</p>
                    <i class="fa-solid fa-pen-nib text-blue-500 text-xs"></i>
                </div>
                <textarea id="notes" class="w-full h-32 p-4 bg-slate-50 rounded-2xl text-[11px] text-slate-700 resize-none placeholder:text-slate-300" placeholder="Cheque registry or daily tasks..."></textarea>
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="saveNote()" class="bg-slate-100 text-slate-700 py-3 rounded-xl text-[10px] font-bold active:scale-95 transition">Save Local</button>
                    <button onclick="syncMemo()" class="bg-blue-600 text-white py-3 rounded-xl text-[10px] font-bold active:scale-95 transition shadow-lg shadow-blue-100">Send To Telegram</button>
                </div>
            </div>
        </div>

        <div id="calc" class="tab-content space-y-4">
            <div class="crystal-card p-5">
                <p class="text-[10px] font-bold text-orange-500 mb-4 uppercase tracking-widest"><i class="fa-solid fa-shirt mr-2"></i>Profit Calculator</p>
                <div class="space-y-3">
                    <input type="number" id="cost" class="w-full p-3.5 bg-slate-50 rounded-xl placeholder:text-slate-300" placeholder="Cost Price (Rs.)">
                    <input type="number" id="sell" class="w-full p-3.5 bg-slate-50 rounded-xl placeholder:text-slate-300" placeholder="Selling Price (Rs.)">
                    <button onclick="calculateAndSync()" class="w-full bg-orange-500 text-white py-4 rounded-xl text-[10px] font-bold shadow-lg shadow-orange-100 active:scale-95 transition">Calculate & Sync</button>
                    <div id="profit-view" class="hidden text-center pt-4 border-t border-dashed border-slate-100">
                        <p id="res-val" class="text-xl font-bold text-slate-800"></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="telegram" class="tab-content space-y-4">
            <div class="crystal-card p-5">
                <p class="text-[10px] font-bold text-slate-400 mb-4 uppercase tracking-widest">Configuration</p>
                <div class="space-y-4">
                    <input type="text" id="bot-token" class="w-full p-3.5 bg-slate-50 rounded-xl" placeholder="Bot API Token">
                    <input type="text" id="chat-id" class="w-full p-3.5 bg-slate-50 rounded-xl" placeholder="Your Chat ID">
                    <button onclick="saveConfig()" class="w-full bg-slate-800 text-white py-3.5 rounded-xl text-[10px] font-bold active:scale-95 transition">Update Settings</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 h-20 flex items-center justify-around px-6">
        <button onclick="switchTab('home', this)" class="nav-btn nav-active flex flex-col items-center flex-1 py-3 transition-all">
            <i class="fa-solid fa-briefcase text-[16px]"></i>
            <span class="text-[9px] mt-1.5 font-bold uppercase tracking-tighter">Hub</span>
        </button>
        <button onclick="switchTab('calc', this)" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-3 transition-all">
            <i class="fa-solid fa-shirt text-[16px]"></i>
            <span class="text-[9px] mt-1.5 font-bold uppercase tracking-tighter">Calc</span>
        </button>
        <button onclick="switchTab('telegram', this)" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-3 transition-all">
            <i class="fa-solid fa-gear text-[16px]"></i>
            <span class="text-[9px] mt-1.5 font-bold uppercase tracking-tighter">Sync</span>
        </button>
    </nav>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-slate-300'); });
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('nav-active');
            btn.classList.remove('text-slate-300');
        }

        async function sendToTelegram(message) {
            const token = localStorage.getItem('bot_token');
            const chatid = localStorage.getItem('chat_id');
            if(!token || !chatid) return alert("Please check Sync Settings first!");
            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatid}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);
                const data = await res.json();
                return data.ok;
            } catch(e) { return false; }
        }

        async function syncMemo() {
            const note = document.getElementById('notes').value;
            if(!note) return alert("Empty memo!");
            const success = await sendToTelegram(`📝 *Office Memo Sync*\n\n${note}`);
            if(success) alert("Memo Synced to Telegram! 🚀");
            else alert("Sync Failed! Check settings.");
        }

        async function calculateAndSync() {
            const cost = parseFloat(document.getElementById('cost').value);
            const sell = parseFloat(document.getElementById('sell').value);
            if(cost && sell) {
                const profit = sell - cost;
                document.getElementById('res-val').innerText = "Rs. " + profit.toLocaleString();
                document.getElementById('profit-view').classList.remove('hidden');
                
                const msg = `👕 *Clothing Business Report*\n\nCost: Rs. ${cost.toLocaleString()}\nSell: Rs. ${sell.toLocaleString()}\n*Profit: Rs. ${profit.toLocaleString()}*`;
                await sendToTelegram(msg);
                alert("Profit Calculated & Synced! 🚀");
            }
        }

        function saveConfig() {
            localStorage.setItem('bot_token', document.getElementById('bot-token').value);
            localStorage.setItem('chat_id', document.getElementById('chat-id').value);
            alert('Settings Saved! ✅');
        }

        function saveNote() {
            localStorage.setItem('gayan_note_v4', document.getElementById('notes').value);
            alert('Note Saved Locally! ✅');
        }

        window.onload = () => {
            document.getElementById('bot-token').value = localStorage.getItem('bot_token') || '';
            document.getElementById('chat-id').value = localStorage.getItem('chat_id') || '';
            document.getElementById('notes').value = localStorage.getItem('gayan_note_v4') || '';
        }
    </script>
</body>
</html>
