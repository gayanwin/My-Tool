<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayan Hub v3.3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Poppins', sans-serif; font-size: 11px; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .crystal-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .nav-active { color: #2563eb; border-top: 2px solid #2563eb; background: linear-gradient(to bottom, #eff6ff, #ffffff); }
        input { font-size: 11px !important; outline: none; border: 1px solid #e2e8f0 !important; }
        input:focus { border-color: #3b82f6 !important; ring: 2px solid #dbeafe; }
        .v-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-[12px] font-semibold text-slate-800 tracking-tight">Gayan Chinthaka</h1>
            <p class="text-[9px] text-slate-400 uppercase font-medium">NWSDB O&M • Kurunegala</p>
        </div>
        <div class="flex flex-col items-end">
            <span class="v-badge bg-blue-600 text-white px-2 py-0.5 rounded-full shadow-sm">v3.3.0</span>
            <span class="text-[8px] text-blue-400 mt-1 font-bold uppercase tracking-widest italic underline">Crystal UI</span>
        </div>
    </header>

    <main class="px-4 pt-5">
        
        <div id="telegram" class="tab-content active space-y-4">
            <div class="crystal-card p-5">
                <div class="flex items-center space-x-2 mb-4">
                    <div class="w-6 h-6 bg-blue-500 rounded-lg flex items-center justify-center text-white text-[10px]">
                        <i class="fa-brands fa-telegram"></i>
                    </div>
                    <h2 class="text-[10px] font-bold text-slate-700 uppercase tracking-wider">Sync Setup</h2>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] text-slate-400 font-bold uppercase ml-1">1. Bot API Token</label>
                        <input type="text" id="bot-token" class="w-full mt-1.5 p-3 bg-slate-50 rounded-xl text-slate-600 placeholder:text-slate-300" placeholder="Paste Token (e.g. 12345:AA...)">
                    </div>
                    
                    <div>
                        <label class="text-[9px] text-slate-400 font-bold uppercase ml-1">2. Your Chat ID</label>
                        <input type="text" id="chat-id" class="w-full mt-1.5 p-3 bg-slate-50 rounded-xl text-slate-600 placeholder:text-slate-300" placeholder="Enter ID (e.g. 74839201)">
                        <div class="mt-2 p-2 bg-amber-50 rounded-lg border border-amber-100 flex items-start space-x-2">
                            <i class="fa-solid fa-circle-info text-amber-500 mt-0.5"></i>
                            <p class="text-[9px] text-amber-700 leading-tight">ටෙලිග්‍රෑම් එකේ <b>@userinfobot</b> එකෙන් ඔයාගේ Chat ID එක ගන්න මචං.</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button onclick="saveConfig()" class="bg-slate-800 text-white py-3 rounded-xl text-[10px] font-bold active:scale-95 transition">Save All</button>
                        <button onclick="sendTestMsg()" class="bg-blue-600 text-white py-3 rounded-xl text-[10px] font-bold active:scale-95 transition shadow-lg shadow-blue-100">Send Test</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="home" class="tab-content space-y-4">
            <div class="crystal-card p-5">
                <p class="text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-widest">Office Note</p>
                <textarea id="notes" class="w-full h-32 p-4 bg-slate-50 rounded-xl border-none text-[11px] text-slate-700 resize-none placeholder:text-slate-300" placeholder="Cheque registry details..."></textarea>
                <button onclick="saveNote()" class="w-full mt-3 bg-slate-900 text-white py-3 rounded-xl text-[10px] font-bold active:scale-95 transition">Save To Device</button>
            </div>
        </div>

        <div id="calc" class="tab-content space-y-4">
            <div class="crystal-card p-5 text-center py-12">
                <i class="fa-solid fa-calculator text-slate-200 text-4xl mb-4"></i>
                <p class="text-slate-400 text-[10px] font-medium uppercase tracking-widest">Calculators Loading...</p>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 h-20 flex items-center justify-around px-4 shadow-[0_-10px_15px_rgba(0,0,0,0.02)]">
        <button onclick="switchTab('home', this)" class="nav-btn text-slate-400 flex flex-col items-center flex-1 py-3 transition-all duration-300">
            <i class="fa-solid fa-briefcase text-[15px]"></i>
            <span class="text-[9px] mt-1.5 font-bold uppercase tracking-tighter">Office</span>
        </button>
        <button onclick="switchTab('telegram', this)" class="nav-btn nav-active flex flex-col items-center flex-1 py-3 transition-all duration-300">
            <i class="fa-brands fa-telegram text-[18px]"></i>
            <span class="text-[9px] mt-1.5 font-bold uppercase tracking-tighter">Sync</span>
        </button>
        <button onclick="switchTab('calc', this)" class="nav-btn text-slate-400 flex flex-col items-center flex-1 py-3 transition-all duration-300">
            <i class="fa-solid fa-chart-line text-[15px]"></i>
            <span class="text-[9px] mt-1.5 font-bold uppercase tracking-tighter">Tools</span>
        </button>
    </nav>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-slate-400'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('nav-active');
            btn.classList.remove('text-slate-400');
        }

        function saveConfig() {
            localStorage.setItem('bot_token', document.getElementById('bot-token').value);
            localStorage.setItem('chat_id', document.getElementById('chat-id').value);
            alert('Settings Saved! ✅');
        }

        async function sendTestMsg() {
            const token = document.getElementById('bot-token').value || localStorage.getItem('bot_token');
            const chatid = document.getElementById('chat-id').value || localStorage.getItem('chat_id');
            
            if(!token || !chatid) return alert("Please fill both Token and Chat ID! ⚠️");
            
            const msg = "✅ *Gayan Hub v3.3.0 Sync Success!*\n\nThis connection is now active. You can sync your data.";
            
            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatid}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                const data = await res.json();
                if(data.ok) alert("🚀 Test Success! Check Telegram.");
                else alert("❌ Error: " + data.description);
            } catch(e) { alert("⚠️ Connection Error!"); }
        }

        function saveNote() {
            localStorage.setItem('gayan_note_v3', document.getElementById('notes').value);
            alert('Note Saved! ✅');
        }

        window.onload = () => {
            document.getElementById('bot-token').value = localStorage.getItem('bot_token') || '';
            document.getElementById('chat-id').value = localStorage.getItem('chat_id') || '';
            document.getElementById('notes').value = localStorage.getItem('gayan_note_v3') || '';
        }
    </script>
</body>
</html>
