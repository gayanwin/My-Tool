<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayan Smart AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .chat-container { height: 350px; overflow-y: auto; scroll-behavior: smooth; }
        /* Hide scrollbar */
        .chat-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-6">

    <div class="bg-blue-600 pt-8 pb-10 px-6 rounded-b-[40px] shadow-lg text-white">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Gayan's Assistant</h1>
                <p class="text-blue-100 text-xs">NWSDB O&M • Kurunegala</p>
            </div>
            <i class="fa-solid fa-robot text-2xl opacity-50"></i>
        </div>
    </div>

    <div class="px-5 -mt-6">
        <div class="app-card p-4 flex flex-col">
            <div id="chat-box" class="chat-container space-y-4 mb-4 p-2">
                <div class="bg-blue-50 text-blue-700 p-3 rounded-2xl rounded-tl-none text-sm border border-blue-100">
                    ආයුබෝවන් මචං! මම Gemini AI. මොනවා හරි අහන්න, මම උදව් කරන්නම්. 🤖
                </div>
            </div>

            <div class="relative flex items-center">
                <input type="text" id="user-input" 
                    class="w-full p-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-blue-400 text-sm outline-none" 
                    placeholder="Ask me anything...">
                <button onclick="sendMessage()" 
                    class="absolute right-2 bg-blue-600 text-white p-3 rounded-xl shadow-md active:scale-90 transition">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <p class="text-center text-gray-400 text-[10px] mt-4">Connected to Gemini 1.5 Flash API</p>
    </div>

    <script>
        const API_KEY = "AIzaSyCWGKpugD0A7Lyn7SmiDRs1b3g1zOcI--Y";

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = inputField.value.trim();

            if (!userText) return;

            // Display User Message
            chatBox.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none text-sm shadow-sm max-w-[80%]">
                        ${userText}
                    </div>
                </div>`;
            
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loading state
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="text-gray-400 text-[10px] animate-pulse">AI හිතමින් පවතී...</div>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.candidates && data.candidates[0].content) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `
                        <div class="flex justify-start">
                            <div class="bg-white border border-gray-100 p-3 rounded-2xl rounded-tl-none text-sm shadow-sm text-gray-800 max-w-[85%]">
                                ${aiResponse}
                            </div>
                        </div>`;
                } else {
                    throw new Error("Invalid Response");
                }
            } catch (error) {
                document.getElementById(loadingId).innerHTML = `<span class="text-red-500 italic">අවුලක් වුණා මචං. Key එක තාම Active නැතුව ඇති.</span>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Allow 'Enter' key to send message
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
