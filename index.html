<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gayan Hub v3.2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Poppins', sans-serif; font-size: 11px; color: #334155; }
        .app-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #2563eb; font-weight: 600; border-top: 2px solid #2563eb; }
        .mono-text { font-family: 'IBM Plex Mono', monospace; }
        input { outline: none; transition: ring 0.2s; }
        input:focus { ring: 1px solid #bfdbfe; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-white border-b border-slate-100 p-4 sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-[12px] font-semibold text-slate-900 leading-tight">Gayan Chinthaka Hub</h1>
                <p class="text-[9px] text-slate-400 uppercase tracking-tight">NWSDB O&M Kurunegala</p>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[9px] font-bold text-white bg-blue-600 px-2 py-0.5 rounded-full shadow-sm">v3.2.0</span>
                <span class="text-[8px] text-green-500 font-medium mt-1 uppercase tracking-tighter">System Active</span>
            </div>
        </div>
    </div>

    <div class="px-3 pt-4">
        
        <div id="telegram" class="tab-content active space-y-3">
            <div class="app-card p-4">
                <div class="flex items-center space-x-2 mb-3">
                    <i class="fa-brands fa-telegram text-blue-500 text-lg"></i>
                    <p class="text-[10px] font-semibold text-slate-700 uppercase tracking-wide">Sync Dashboard</p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-medium ml-1">Bot API Token</label>
                        <input type="text" id="bot-token" class="w-full mt-1 p-2.5 bg-slate-50 rounded-lg border-none text-[11px] text-slate-600" placeholder="Paste Token Here">
                    </div>
                    
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-medium ml-1">Your Chat ID</label>
                        <input type="text" id="chat-id" class="w-full mt-1 p-2.5 bg-slate-50 rounded-lg border-none text-[11px] text-slate-600" placeholder="e.g. 74839201">
                        <p class="text-[8px] text-slate-400 mt-1 italic leading-tight">* Get Chat ID from @userinfobot on Telegram.</p>
                    </div>

                    <div class="grid grid-cols-2 gap-2 pt-1">
                        <button onclick="checkBot()" class="bg-slate-100 text-slate-700 py-2.5 rounded-lg text-[10px] font-semibold active:scale-95 transition border border-slate-200">Verify Bot</button>
                        <button onclick="sendTestMsg()" class="bg-blue-600 text-white py-2.5 rounded-lg text-[10px] font-semibold active:scale-95 transition shadow-md shadow-blue-100">Send Test</button>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-blue-50/50 rounded-xl border border-blue-100">
                <p class="text-[10px] text-blue-700 leading-normal">
                    <i class="fa-solid fa-circle-info mr-1"></i>
                    Telegram එකේ මැසේජ් එන්න නම් Bot එකට ගිහින් <b>/start</b> කරන්න අමතක කරන්න එපා මචං.
                </p>
            </div>
        </div>

        <div id="home" class="tab-content space-y-3">
            <div class="app-card p-4">
                <p class="text-[10px] font-semibold text-slate-400 mb-3 uppercase tracking-wide">Office Notepad</p>
                <textarea id="notes" class="w-full h-24 p-3 bg-slate-50 rounded-lg border-none text-[11px] text-slate-700 resize-none" placeholder="Write something..."></textarea>
                <button onclick="saveNote()" class="mt-3 bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px] font-medium active:scale-95 transition">Save Locally</button>
            </div>
        </div>

        <div id="business" class="tab-content space-y-3 text-center py-10">
            <i class="fa-solid fa-screwdriver-wrench text-slate-200 text-4xl"></i>
            <p class="text-slate-400 text-[10px]">Calculators & Tools loading...</p>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 h-18 flex items-center justify-around px-4 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
        <button onclick="switchTab('home', this)" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-2">
            <i class="fa-solid fa-briefcase text-[14px]"></i>
            <span class="text-[9px] mt-1">Office</span>
        </button>
        <button onclick="switchTab('telegram', this)" class="nav-btn nav-active flex flex-col items-center flex-1 py-2">
            <i class="fa-brands fa-telegram text-[16px]"></i>
            <span class="text-[9px] mt-1">Sync</span>
        </button>
        <button onclick="switchTab('business', this)" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-2">
            <i class="fa-solid fa-chart-pie text-[14px]"></i>
            <span class="text-[9px] mt-1">Tools</span>
        </button>
    </nav>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active', 'text-blue-600'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-slate-300'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('nav-active', 'text-blue-600');
            btn.classList.remove('text-slate-300');
        }

        async function checkBot() {
            const token = document.getElementById('bot-token').value;
            if(!token) return alert("Please enter Bot Token!");
            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/getMe`);
                const data = await res.json();
                if(data.ok) alert("✅ Bot is Online: " + data.result.first_name);
                else alert("❌ Invalid Token!");
            } catch(e) { alert("⚠️ Connection Error!"); }
        }

        async function sendTestMsg() {
            const token = document.getElementById('bot-token').value;
            const chatid = document.getElementById('chat-id').value;
            if(!token || !chatid) return alert("Token & Chat ID are required!");
            
            const msg = "🚀 *Gayan Hub v3.2.0*\n\nSync is active and working perfectly! ✅";
            
            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatid}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                const data = await res.json();
                if(data.ok) alert("🚀 Test Message Sent Successfully!");
                else alert("❌ Error: " + data.description);
            } catch(e) { alert("⚠️ Failed to reach Telegram."); }
        }

        function saveNote() {
            localStorage.setItem('gayan_memo_v3', document.getElementById('notes').value);
            alert('Note Saved! ✅');
        }

        window.onload = () => {
            document.getElementById('notes').value = localStorage.getItem('gayan_memo_v3') || '';
        }
    </script>
</body>
</html>
