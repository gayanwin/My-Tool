<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gayan's Smart Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Gayan Chinthaka Dashboard</h1>
            <span class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-sm font-medium">NWSDB O&M</span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 text-blue-600">Quick Office Notes</h2>
                <textarea id="notes" class="w-full h-32 p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Type here..."></textarea>
                <button onclick="saveNote()" class="mt-3 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Save Locally</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 text-green-600">Daily Tasks / Stock</h2>
                <ul class="space-y-3">
                    <li class="flex items-center text-gray-700"><input type="checkbox" class="mr-3"> Check Cheque Registry</li>
                    <li class="flex items-center text-gray-700"><input type="checkbox" class="mr-3"> Update Clothing Stock</li>
                    <li class="flex items-center text-gray-700"><input type="checkbox" class="mr-3"> Visit Kurunegala Branch</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function saveNote() {
            localStorage.setItem('gayan_note', document.getElementById('notes').value);
            alert('Note Saved to Browser!');
        }
        window.onload = () => {
            document.getElementById('notes').value = localStorage.getItem('gayan_note') || '';
        }
    </script>
</body>
</html>
